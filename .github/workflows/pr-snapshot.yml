name: PR Snapshot

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  snapshot:
    name: Publish per-commit snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build publishable packages
        run: bunx turbo run build --filter=@icpfinder/core --filter=@icpfinder/providers

      - name: Publish snapshot to pkg.pr.new
        run: bunx pkg-pr-new publish --comment=update './packages/core' './packages/providers'
