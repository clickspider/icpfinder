name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

# id-token: write is required for npm Trusted Publishing (OIDC) + provenance.
# contents/pull-requests: write let changesets/action open the "Version Packages" PR.
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Node 22 + npm 11.5+ is required for OIDC Trusted Publishing.
      # setup-node also writes ~/.npmrc with registry-url, which npm publish reads.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to latest (>=11.5 needed for OIDC)
        run: npm install -g npm@latest

      # Bun is used for install + scripts. Changesets shells out to `npm publish`
      # for the actual publish step, which is what picks up the OIDC token.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build publishable packages
        run: bunx turbo run build --filter=@icpfinder/core --filter=@icpfinder/providers

      # No NPM_TOKEN — Trusted Publishing exchanges the GitHub OIDC token for
      # a short-lived npm publish token at publish time. NPM_CONFIG_PROVENANCE
      # is still required so the resulting tarball ships a provenance attestation.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun run version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
